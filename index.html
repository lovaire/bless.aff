<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bless.aff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #222222;
    --border2: #2a2a2a;
    --text: #f0f0f0;
    --text-muted: #666;
    --text-dim: #999;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --accent-glow: rgba(200,240,96,0.06);
    --card-radius: 16px;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .logo span {
    color: var(--accent);
  }

  .logo-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .search-wrap {
    flex: 1;
    max-width: 480px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 14px 10px 42px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  #searchInput::placeholder { color: var(--text-muted); }
  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .product-count {
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.5px;
  }

  .product-count strong {
    color: var(--accent);
    font-weight: 600;
  }

  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    position: relative;
    z-index: 1;
  }

  .hero {
    padding: 40px 0 32px;
    margin-bottom: 8px;
  }

  .hero-eyebrow {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 20px;
    height: 1px;
    background: var(--accent);
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1.05;
    color: var(--text);
  }

  .hero h1 em {
    font-style: normal;
    color: var(--accent);
  }

  #productGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color var(--transition);
    animation: fadeUp 0.4s ease both;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
  }

  .card:hover {
    border-color: var(--accent);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-img {
    position: relative;
    aspect-ratio: 1;
    background: var(--surface2);
    overflow: hidden;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-img .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 32px;
  }

  .card-body {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .card-title {
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    letter-spacing: 0.1px;
  }

  .card-meta {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card-price {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }

  .card-store {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-sales {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-sales span {
    color: var(--accent);
    font-weight: 600;
  }

  .empty-state {
    grid-column: 1 / -1;
    padding: 80px 20px;
    text-align: center;
    color: var(--text-muted);
  }

  .empty-state .emoji {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
    opacity: 0.5;
  }

  .empty-state h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 640px) {
    .header-inner { height: 56px; padding: 0; gap: 12px; }
    header { padding: 0 16px; }
    main { padding: 16px; }
    #productGrid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .hero { padding: 24px 0 20px; }
    .hero h1 { font-size: 28px; }
  }
</style>
</head>

  <div id="productGrid"></div>
</main>

// PARSER & HELPER
// ============================
function parsePrice(str) {
  if (!str) return 0;
  let s = str.toString().trim().toUpperCase();
  let multiplier = 1;
  if (s.endsWith('JT') || s.endsWith('JT+')) { multiplier = 1000000; s = s.replace(/JT\+?$/, ''); }
  else if (s.endsWith('RB') || s.endsWith('RB+')) { multiplier = 1000; s = s.replace(/RB\+?$/, ''); }
  
  s = s.replace(/[^0-9,.]/g, '').replace(',', '.');
  return parseFloat(s) * multiplier || 0;
}

function parseSales(str) {
  if (!str) return 0;
  let s = str.toString().trim().toUpperCase();
  if (s.endsWith('JT+') || s.endsWith('JT')) return parseFloat(s) * 1000000;
  if (s.endsWith('RB+') || s.endsWith('RB')) return parseFloat(s) * 1000;
  return parseInt(s.replace(/[^0-9]/g, '')) || 0;
}

function formatPrice(num) {
  return 'Rp ' + Math.round(num).toLocaleString('id-ID');
}

function parseCSV(raw) {
  const lines = raw.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const header = lines[0].split('\t').map(h => h.trim());
  const results = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split('\t');
    if (cols.length < 3) continue;
    const obj = {};
    header.forEach((h, idx) => { obj[h] = (cols[idx] || '').trim(); });
    results.push(obj);
  }
  return results;
}

function mapProducts(rows) {
  return rows.map((r, i) => ({
    id: r['ID Produk'] || i,
    name: r['Nama Produk'] || '-',
    priceNum: parsePrice(r['Harga']),
    sales: r['Penjualan'] || '0',
    salesNum: parseSales(r['Penjualan']),
    store: r['Nama Toko'] || '-',
    link: r['Link Komisi Ekstra'] || r['Link Produk'] || '#',
    image: r['Link Gambar'] || '',
  }));
}

  return `

      <div class="card-img">
        ${p.image
          ? `<img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\"img-placeholder\\">🛍️</div>`
          : `<div class="img-placeholder">🛍️</div>`}
      </div>
      <div class="card-body">
        <div class="card-title">${p.name}</div>
        <div class="card-meta">
          <div class="card-price">${formatPrice(p.priceNum)}</div>
          <div class="card-bottom">
            <div class="card-store">
              <i class="ph ph-storefront" style="font-size:13px"></i>
              ${p.store}
            </div>
            <div class="card-sales"><span>${p.sales}</span> terjual</div>
          </div>
        </div>
      </div>
    </a>`;
}

function getFiltered() {
  let list = [...allProducts];
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.store.toLowerCase().includes(q)
    );
  }
  return list;
}

function render() {
  const list = getFiltered();
  const grid = document.getElementById('productGrid');
  document.getElementById('visibleCount').textContent = list.length;

  if (list.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <span class="emoji">🔍</span>
        <h3>Produk tidak ditemukan</h3>
        <p>Coba kata kunci lain.</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map((p, i) => renderCard(p, Math.min(i * 30, 300))).join('');
}

// ============================
// INIT
// ============================
function init() {
  const rows = parseCSV(RAW_CSV);
  allProducts = mapProducts(rows);

  // Hapus duplikat berdasarkan ID
  const seen = new Set();
  allProducts = allProducts.filter(p => {
    if (seen.has(p.id)) return false;
    seen.add(p.id);
    return true;
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });

  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
