<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bless.aff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #222222;
    --border2: #2a2a2a;
    --text: #f0f0f0;
    --text-muted: #666;
    --text-dim: #999;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --accent-glow: rgba(200,240,96,0.06);
    --red: #ff4d4d;
    --card-radius: 16px;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .logo span {
    color: var(--accent);
  }

  .logo-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* SEARCH */
  .search-wrap {
    flex: 1;
    max-width: 480px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 14px 10px 42px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  #searchInput::placeholder { color: var(--text-muted); }
  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .product-count {
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.5px;
  }

  .product-count strong {
    color: var(--accent);
    font-weight: 600;
  }

  /* MAIN LAYOUT */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    position: relative;
    z-index: 1;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-right: 4px;
  }

  .filter-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all var(--transition);
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .chip.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }

  /* SORT */
  .sort-select {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 7px 12px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    transition: border-color var(--transition);
  }

  .sort-select:focus {
    border-color: var(--accent);
  }

  /* GRID */
  #productGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
    animation: fadeUp 0.4s ease both;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--border2);
    box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--border2);
  }

  .card:hover .card-img img {
    transform: scale(1.04);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-img {
    position: relative;
    aspect-ratio: 1;
    background: var(--surface2);
    overflow: hidden;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    display: block;
  }

  .card-img .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 32px;
  }

  .commission-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--accent);
    color: #0a0a0a;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 6px;
    line-height: 1.4;
  }

  .card-body {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .card-title {
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    letter-spacing: 0.1px;
  }

  .card-meta {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card-price {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }

  .card-store {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 120px;
  }

  .card-sales {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-sales span {
    color: var(--accent);
    font-weight: 600;
  }

  /* COMMISSION ROW */
  .card-commission {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    margin-top: 2px;
  }

  .commission-label {
    font-size: 11px;
    color: var(--text-muted);
  }

  .commission-value {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
  }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1 / -1;
    padding: 80px 20px;
    text-align: center;
    color: var(--text-muted);
  }

  .empty-state .emoji {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
    opacity: 0.5;
  }

  .empty-state h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  /* HERO SECTION */
  .hero {
    padding: 40px 0 32px;
    margin-bottom: 8px;
  }

  .hero-eyebrow {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 20px;
    height: 1px;
    background: var(--accent);
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1.05;
    color: var(--text);
  }

  .hero h1 em {
    font-style: normal;
    color: var(--accent);
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .header-inner { height: 56px; padding: 0; gap: 12px; }
    header { padding: 0 16px; }
    main { padding: 16px; }
    #productGrid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .hero { padding: 24px 0 20px; }
    .hero h1 { font-size: 28px; }
    .sort-select { display: none; }
  }

  @media (max-width: 400px) {
    #productGrid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">
      bless<span>.aff</span>
      <span class="logo-dot"></span>
    </a>
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Cari produk...">
    </div>
    <div class="product-count">
      <strong id="visibleCount">0</strong> produk
    </div>
  </div>
</header>

<main>
  <div class="hero">
    <div class="hero-eyebrow">curated picks</div>
    <h1>produk <em>terpilih</em><br>harga terbaik.</h1>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Filter</span>
    <div class="filter-chips" id="filterChips">
      <button class="chip active" data-filter="all">Semua</button>
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="default">Urutkan: Default</option>
      <option value="price-asc">Harga: Rendah ke Tinggi</option>
      <option value="price-desc">Harga: Tinggi ke Rendah</option>
      <option value="sales-desc">Terlaris</option>
      <option value="commission-desc">Komisi Tertinggi</option>
    </select>
  </div>

  <div id="productGrid"></div>
</main>

<script>
// ============================
// DATA — PASTE CSV DATA DI SINI
// Untuk menambah produk dari CSV baru, paste isi CSV di bawah ini
// (pisahkan dengan baris baru, format: tab-separated sesuai ekspor Shopee)
// ============================
const RAW_CSV = `ID Produk	Nama Produk	Harga	Penjualan	Nama Toko	Komisi hingga	Komisi	Link Produk	Link Komisi Ekstra	Link Gambar
29811410033	1SET TINTA EPSON 003 ORIGINAL TIPE PRINTER L SERIES  L1110, L3110, L5190, L1210, L1216, L1250, L1256	139,5RB	6RB+	TRENDY_LASER	20%	Rp27.900	https://shopee.co.id/product/1359110064/29811410033	https://s.shopee.co.id/9Ux5ZNrfgE	https://down-id.img.susercontent.com/file/id-11134207-7ras8-m0ro2xo7hsm8c4@resize_w900_nl.webp`;

// ============================
// PARSER
// ============================
function parsePrice(str) {
  if (!str) return 0;
  str = str.toString().trim().toUpperCase();
  let multiplier = 1;
  if (str.endsWith('JT') || str.endsWith('JT+')) { multiplier = 1000000; str = str.replace(/JT\+?$/, ''); }
  else if (str.endsWith('RB') || str.endsWith('RB+')) { multiplier = 1000; str = str.replace(/RB\+?$/, ''); }
  str = str.replace(/[^0-9,.]/g, '').replace(',', '.');
  return parseFloat(str) * multiplier || 0;
}

function parseSales(str) {
  if (!str) return 0;
  str = str.toString().trim().toUpperCase();
  if (str.endsWith('JT+') || str.endsWith('JT')) { return parseFloat(str) * 1000000; }
  if (str.endsWith('RB+') || str.endsWith('RB')) { return parseFloat(str) * 1000; }
  return parseInt(str.replace(/[^0-9]/g, '')) || 0;
}

function parseCommissionValue(str) {
  if (!str) return 0;
  str = str.toString().trim().replace(/[^0-9]/g, '');
  return parseInt(str) || 0;
}

function parseCSV(raw) {
  const lines = raw.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const header = lines[0].split('\t').map(h => h.trim());
  const results = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split('\t');
    if (cols.length < 3) continue;
    const obj = {};
    header.forEach((h, idx) => { obj[h] = (cols[idx] || '').trim(); });
    results.push(obj);
  }
  return results;
}

// ============================
// MAP TO PRODUCT OBJECTS
// ============================
function mapProducts(rows) {
  return rows.map((r, i) => ({
    id: r['ID Produk'] || i,
    name: r['Nama Produk'] || '-',
    priceRaw: r['Harga'] || '0',
    priceNum: parsePrice(r['Harga']),
    sales: r['Penjualan'] || '0',
    salesNum: parseSales(r['Penjualan']),
    store: r['Nama Toko'] || '-',
    commissionPct: r['Komisi hingga'] || '',
    commissionVal: r['Komisi'] || '',
    commissionNum: parseCommissionValue(r['Komisi']),
    link: r['Link Komisi Ekstra'] || r['Link Produk'] || '#',
    image: r['Link Gambar'] || '',
  }));
}

// ============================
// STATE
// ============================
let allProducts = [];
let activeFilter = 'all';
let searchQuery = '';
let sortMode = 'default';

// ============================
// RENDER
// ============================
function formatPrice(raw) {
  if (!raw) return '-';
  const s = raw.toString().trim();
  if (s.toUpperCase().includes('RB') || s.toUpperCase().includes('JT')) {
    const num = parsePrice(s);
    if (num >= 1000000) return 'Rp' + (num/1000000).toFixed(num%1000000===0?0:1) + ' JT';
    if (num >= 1000) return 'Rp' + Math.round(num/1000) + ' RB';
    return 'Rp' + num;
  }
  return s.startsWith('Rp') ? s : 'Rp' + s;
}

function renderCard(p, delay) {
  return `
    <a class="card" href="${p.link}" target="_blank" rel="noopener" style="animation-delay:${delay}ms">
      <div class="card-img">
        ${p.image
          ? `<img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\"img-placeholder\\">🛍️</div>'">`
          : `<div class="img-placeholder">🛍️</div>`}
        ${p.commissionPct ? `<div class="commission-badge">${p.commissionPct}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${p.name}</div>
        <div class="card-meta">
          <div class="card-price">${formatPrice(p.priceRaw)}</div>
          <div class="card-bottom">
            <div class="card-store">🏪 ${p.store}</div>
            <div class="card-sales"><span>${p.sales}</span> terjual</div>
          </div>
          ${p.commissionVal ? `
          <div class="card-commission">
            <div class="commission-label">komisi:</div>
            <div class="commission-value">${p.commissionVal}</div>
          </div>` : ''}
        </div>
      </div>
    </a>`;
}

function getFilteredSorted() {
  let list = [...allProducts];

  // Filter by store
  if (activeFilter !== 'all') {
    list = list.filter(p => p.store.toLowerCase() === activeFilter.toLowerCase());
  }

  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.store.toLowerCase().includes(q)
    );
  }

  // Sort
  if (sortMode === 'price-asc') list.sort((a,b) => a.priceNum - b.priceNum);
  else if (sortMode === 'price-desc') list.sort((a,b) => b.priceNum - a.priceNum);
  else if (sortMode === 'sales-desc') list.sort((a,b) => b.salesNum - a.salesNum);
  else if (sortMode === 'commission-desc') list.sort((a,b) => b.commissionNum - a.commissionNum);

  return list;
}

function render() {
  const list = getFilteredSorted();
  const grid = document.getElementById('productGrid');
  document.getElementById('visibleCount').textContent = list.length;

  if (list.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <span class="emoji">🔍</span>
        <h3>Produk tidak ditemukan</h3>
        <p>Coba kata kunci lain atau ubah filter.</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map((p, i) => renderCard(p, Math.min(i * 30, 300))).join('');
}

// ============================
// FILTER CHIPS (by store)
// ============================
function buildFilterChips() {
  const stores = [...new Set(allProducts.map(p => p.store))].sort();
  const container = document.getElementById('filterChips');
  const existing = container.querySelector('[data-filter="all"]');
  container.innerHTML = '';
  container.appendChild(existing || (() => {
    const b = document.createElement('button');
    b.className = 'chip active';
    b.dataset.filter = 'all';
    b.textContent = 'Semua';
    return b;
  })());
  stores.forEach(store => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.dataset.filter = store;
    b.textContent = store;
    container.appendChild(b);
  });
  container.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    render();
  });
}

// ============================
// INIT
// ============================
function init() {
  const rows = parseCSV(RAW_CSV);
  allProducts = mapProducts(rows);

  // Remove duplicates by ID
  const seen = new Set();
  allProducts = allProducts.filter(p => {
    if (seen.has(p.id)) return false;
    seen.add(p.id);
    return true;
  });

  buildFilterChips();

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });

  document.getElementById('sortSelect').addEventListener('change', e => {
    sortMode = e.target.value;
    render();
  });

  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
